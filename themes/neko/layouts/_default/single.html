{{ define "main" }}
<article class="post-content">
    <h1>{{ .Title }}</h1>
    <div class="post-meta">
        <span>{{ .Date.Format "2006/01/02" }}</span>
        {{ with .Params.tags }}
        <span> · </span>
        {{ range . }}
        <span class="tag">{{ . }}</span>
        {{ end }}
        {{ end }}
    </div>
    <div class="post-body">
        {{ .Content }}
    </div>
</article>
{{ end }}
