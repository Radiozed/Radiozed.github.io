<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }} - {{ .Site.Title }}{{ end }}</title>
    <meta name="description" content="{{ with .Description }}{{ . }}{{ else }}{{ .Site.Params.description }}{{ end }}">

    <!-- 预加载 CSS -->
    {{ $style := resources.Get "css/main.css" }}
    <link rel="stylesheet" href="{{ $style.RelPermalink }}">

    <!-- 图标 -->
    <link rel="icon" type="image/png" href="/favicon.png">

    <!-- SEO -->
    <meta name="author" content="{{ .Site.Params.author }}">
    <meta name="keywords" content="Radiozed, 博客, 猫娘, Neko, Lidure">

    <!-- Open Graph -->
    <meta property="og:title" content="{{ .Site.Title }}">
    <meta property="og:description" content="{{ .Site.Params.description }}">
    <meta property="og:type" content="website">
    <meta property="og:url" content="{{ .Site.BaseURL }}">
</head>
<body>
    <!-- 背景粒子 -->
    <div class="bg-particles" id="particles"></div>

    <!-- 猫耳朵装饰 -->
    <div class="cat-ears">
        <div class="cat-ear left"></div>
        <div class="cat-ear right"></div>
    </div>

    <!-- 导航栏 -->
    <nav>
        <a href="{{ .Site.BaseURL }}" class="logo">{{ .Site.Title }}</a>
        <ul class="nav-links">
            <li><a href="/posts">文章</a></li>
            <li><a href="/gallery">作品</a></li>
            <li><a href="/about">关于</a></li>
        </ul>
    </nav>

    <!-- 主内容 -->
    <main>
        {{ block "main" . }}{{ end }}
    </main>

    <!-- 猫尾巴 -->
    <div class="cat-tail"></div>

    <!-- 页脚 -->
    <footer>
        <div class="social-links">
            {{ with .Site.Params.github }}
            <a href="{{ . }}" target="_blank" title="GitHub">🐱</a>
            {{ end }}
            {{ with .Site.Params.qq }}
            <a href="{{ . }}" target="_blank" title="QQ">💬</a>
            {{ end }}
        </div>
        <p class="footer-text">Made with <span>♥</span> by {{ .Site.Params.author }} · 喵~ 🐾</p>
    </footer>

    <!-- 粒子脚本 -->
    <script>
    // 生成背景粒子
    (function() {
        const container = document.getElementById('particles');
        const particleCount = 50;

        for (let i = 0; i < particleCount; i++) {
            const particle = document.createElement('div');
            particle.className = 'particle ' + (Math.random() > 0.7 ? 'heart' : '');
            particle.style.left = Math.random() * 100 + '%';
            particle.style.width = (Math.random() * 6 + 2) + 'px';
            particle.style.height = particle.style.width;
            particle.style.background = Math.random() > 0.7 ?
                'rgba(255, 107, 157, ' + (Math.random() * 0.5 + 0.3) + ')' :
                'rgba(155, 89, 182, ' + (Math.random() * 0.5 + 0.2) + ')';
            particle.style.animationDuration = (Math.random() * 20 + 15) + 's';
            particle.style.animationDelay = (Math.random() * 20) + 's';
            container.appendChild(particle);
        }
    })();

    // 滚动动画
    (function() {
        const elements = document.querySelectorAll('.fade-in');
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('visible');
                }
            });
        }, { threshold: 0.1 });
        elements.forEach(el => observer.observe(el));
    })();

    // 平滑滚动
    document.querySelectorAll('a[href^="#"]').forEach(anchor => {
        anchor.addEventListener('click', function(e) {
            e.preventDefault();
            const target = document.querySelector(this.getAttribute('href'));
            if (target) target.scrollIntoView({ behavior: 'smooth' });
        });
    });
    </script>
</body>
</html>
