<!DOCTYPE html>
<html>
<head>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: transparent;
      overflow: hidden;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', system-ui, sans-serif;
    }
    .player {
      position: fixed;
      bottom: 20px;
      left: 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      z-index: 999999;
    }

    /* 主按钮 - 播放/暂停 */
    .btn-play {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: linear-gradient(135deg, #FF1493 0%, #FF69B4 50%, #DA70D6 100%);
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      box-shadow:
        0 4px 20px rgba(255, 20, 147, 0.4),
        0 0 40px rgba(255, 20, 147, 0.2),
        inset 0 2px 10px rgba(255, 255, 255, 0.3);
      font-size: 1.4rem;
      color: white;
      position: relative;
      overflow: hidden;
    }
    .btn-play::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: linear-gradient(
        45deg,
        transparent 40%,
        rgba(255, 255, 255, 0.3) 50%,
        transparent 60%
      );
      transform: rotate(45deg) translateX(-100%);
      transition: transform 0.6s ease;
    }
    .btn-play:hover::before {
      transform: rotate(45deg) translateX(100%);
    }
    .btn-play:hover {
      transform: scale(1.1);
      box-shadow:
        0 8px 35px rgba(255, 20, 147, 0.5),
        0 0 50px rgba(255, 20, 147, 0.3),
        inset 0 2px 10px rgba(255, 255, 255, 0.3);
    }
    .btn-play:active {
      transform: scale(0.95);
    }
    .btn-play.playing {
      animation: pulse-glow 2s ease-in-out infinite;
    }
    @keyframes pulse-glow {
      0%, 100% {
        box-shadow:
          0 4px 20px rgba(255, 20, 147, 0.4),
          0 0 40px rgba(255, 20, 147, 0.2);
      }
      50% {
        box-shadow:
          0 4px 30px rgba(255, 20, 147, 0.6),
          0 0 60px rgba(255, 20, 147, 0.4);
      }
    }

    /* 控制面板 - 音量 + 进度 */
    .controls {
      background: rgba(20, 15, 35, 0.85);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-radius: 30px;
      padding: 12px 18px;
      border: 1px solid rgba(255, 105, 180, 0.25);
      box-shadow:
        0 8px 32px rgba(0, 0, 0, 0.3),
        inset 0 1px 0 rgba(255, 255, 255, 0.1);
      display: flex;
      align-items: center;
      gap: 15px;
      opacity: 0;
      transform: translateX(-15px) scale(0.9);
      transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    .player:hover .controls {
      opacity: 1;
      transform: translateX(0) scale(1);
    }

    /* 歌曲信息 */
    .song-info {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .song-title {
      font-size: 0.75rem;
      color: rgba(255, 255, 255, 0.9);
      font-weight: 500;
      max-width: 120px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .song-time {
      font-size: 0.65rem;
      color: rgba(255, 255, 255, 0.5);
    }

    /* 进度条 */
    .progress-wrap {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .progress-bar {
      width: 100px;
      height: 6px;
      -webkit-appearance: none;
      appearance: none;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 3px;
      cursor: pointer;
      overflow: hidden;
    }
    .progress-bar::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 12px;
      height: 12px;
      background: linear-gradient(135deg, #FF1493, #FF69B4);
      border-radius: 50%;
      cursor: pointer;
      box-shadow: 0 2px 8px rgba(255, 20, 147, 0.5);
      transition: transform 0.2s ease;
    }
    .progress-bar::-webkit-slider-thumb:hover {
      transform: scale(1.2);
    }

    /* 音量控制 */
    .volume-wrap {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .volume-icon {
      font-size: 0.9rem;
      color: rgba(255, 255, 255, 0.6);
    }
    .volume-slider {
      width: 70px;
      height: 5px;
      -webkit-appearance: none;
      appearance: none;
      background: linear-gradient(90deg, #FF1493, #FF69B4);
      border-radius: 3px;
      cursor: pointer;
    }
    .volume-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 12px;
      height: 12px;
      background: white;
      border-radius: 50%;
      cursor: pointer;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
    }

    /* 分隔线 */
    .divider {
      width: 1px;
      height: 30px;
      background: linear-gradient(to bottom, transparent, rgba(255, 105, 180, 0.3), transparent);
    }

    /* 列表按钮 */
    .btn-list {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 105, 180, 0.2);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s ease;
      font-size: 1rem;
      color: rgba(255, 255, 255, 0.7);
    }
    .btn-list:hover {
      background: rgba(255, 20, 147, 0.2);
      border-color: rgba(255, 105, 180, 0.5);
      transform: scale(1.1);
    }

    /* 列表面板 */
    .playlist {
      position: fixed;
      bottom: 90px;
      left: 20px;
      background: rgba(20, 15, 35, 0.95);
      backdrop-filter: blur(20px);
      border-radius: 16px;
      padding: 15px;
      border: 1px solid rgba(255, 105, 180, 0.2);
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.4);
      opacity: 0;
      transform: translateY(10px) scale(0.95);
      pointer-events: none;
      transition: all 0.3s ease;
      min-width: 200px;
    }
    .playlist.show {
      opacity: 1;
      transform: translateY(0) scale(1);
      pointer-events: auto;
    }
    .playlist-title {
      font-size: 0.8rem;
      color: rgba(255, 255, 255, 0.5);
      margin-bottom: 10px;
      padding-bottom: 8px;
      border-bottom: 1px solid rgba(255, 105, 180, 0.2);
    }
    .playlist-item {
      padding: 8px 12px;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s ease;
      font-size: 0.85rem;
      color: rgba(255, 255, 255, 0.7);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .playlist-item:hover {
      background: rgba(255, 20, 147, 0.15);
      color: white;
    }
    .playlist-item.active {
      background: linear-gradient(135deg, rgba(255, 20, 147, 0.3), rgba(255, 105, 180, 0.2));
      color: #FF69B4;
    }
  </style>
</head>
<body>
  <audio id="audio" loop preload="auto">
    <source src="bgm.mp3" type="audio/mpeg">
  </audio>

  <div class="player">
    <button class="btn-play playing" id="toggle">🎵</button>

    <div class="controls">
      <div class="song-info">
        <div class="song-title">背景音乐</div>
        <div class="song-time" id="time">00:00 / 00:00</div>
      </div>

      <div class="divider"></div>

      <div class="progress-wrap">
        <input type="range" class="progress-bar" id="progress" min="0" max="100" value="0">
      </div>

      <div class="divider"></div>

      <div class="volume-wrap">
        <span class="volume-icon">🔊</span>
        <input type="range" class="volume-slider" id="volume" min="0" max="100" value="50">
      </div>

      <div class="divider"></div>

      <button class="btn-list" id="listBtn">📋</button>
    </div>
  </div>

  <div class="playlist" id="playlist">
    <div class="playlist-title">🎵 播放列表</div>
    <div class="playlist-item active" data-src="bgm.mp3">🎵 背景音乐</div>
  </div>

  <script>
    const audio = document.getElementById('audio');
    const toggle = document.getElementById('toggle');
    const volume = document.getElementById('volume');
    const progress = document.getElementById('progress');
    const timeDisplay = document.getElementById('time');
    const listBtn = document.getElementById('listBtn');
    const playlist = document.getElementById('playlist');
    const songTitle = document.querySelector('.song-title');

    // 播放列表
    const songs = [
      { name: '背景音乐', src: 'bgm.mp3' }
    ];
    let currentSong = 0;

    // 恢复状态
    const savedVolume = localStorage.getItem('bgmVolume');
    audio.volume = savedVolume ? parseFloat(savedVolume) : 0.5;
    volume.value = audio.volume * 100;

    let isPlaying = false;

    // 格式化时间
    function formatTime(seconds) {
      if (isNaN(seconds)) return '00:00';
      const mins = Math.floor(seconds / 60);
      const secs = Math.floor(seconds % 60);
      return `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
    }

    // 更新时间
    function updateTime() {
      const current = formatTime(audio.currentTime);
      const total = formatTime(audio.duration || 0);
      timeDisplay.textContent = `${current} / ${total}`;

      if (audio.duration) {
        progress.value = (audio.currentTime / audio.duration) * 100;
      }
    }

    // 更新UI
    function updateUI(playing) {
      toggle.textContent = playing ? '🎵' : '⏸️';
      toggle.classList.toggle('playing', playing);
    }

    // 播放
    function play() {
      audio.volume = volume.value / 100;
      const promise = audio.play();
      if (promise !== undefined) {
        promise.then(() => {
          isPlaying = true;
          updateUI(true);
          notifyParent('playing');
        }).catch((e) => {
          console.log('播放失败:', e);
          // 浏览器自动播放策略阻止，尝试加载音频后重试
          audio.load();
          audio.play().then(() => {
            isPlaying = true;
            updateUI(true);
            notifyParent('playing');
          }).catch(() => {
            // 用户必须先交互才能播放
            console.log('需要用户交互才能播放');
          });
        });
      }
    }

    // 暂停
    function pause() {
      audio.pause();
      isPlaying = false;
      updateUI(false);
      notifyParent('paused');
    }

    // 检查是否自动播放（默认关闭）
    const autoPlay = localStorage.getItem('bgmAutoPlay');
    if (autoPlay === 'true') {
      play();
    } else if (autoPlay === null) {
      // 首次访问，默认不自动播放
      localStorage.setItem('bgmAutoPlay', 'false');
    }

    // 切换按钮
    toggle.addEventListener('click', (e) => {
      e.stopPropagation();
      if (isPlaying) pause();
      else play();
    });

    // 音量控制
    volume.addEventListener('input', () => {
      audio.volume = volume.value / 100;
      localStorage.setItem('bgmVolume', audio.volume.toString());
    });

    // 进度条
    progress.addEventListener('input', () => {
      if (audio.duration) {
        audio.currentTime = (progress.value / 100) * audio.duration;
      }
    });

    // 更新播放时间
    audio.addEventListener('timeupdate', updateTime);
    audio.addEventListener('loadedmetadata', updateTime);

    // 列表按钮
    listBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      playlist.classList.toggle('show');
    });

    // 点击其他地方关闭列表
    document.addEventListener('click', () => {
      playlist.classList.remove('show');
    });

    // 歌名点击不关闭列表
    playlist.addEventListener('click', (e) => {
      e.stopPropagation();
    });

    // 监听来自父窗口的消息
    window.addEventListener('message', (e) => {
      if (e.data === 'play') {
        play();
      } else if (e.data === 'pause') {
        pause();
      }
    });

    // 通知父窗口播放状态
    function notifyParent(status) {
      window.parent.postMessage(status, '*');
    }
  </script>
</body>
</html>
